[build]
  publish = "."
  functions = "netlify/functions"

[[headers]]
  for = "/posts.json"
  [headers.values]
    Cache-Control = "public, max-age=60, stale-while-revalidate=300"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/*.html"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"

# Phantom URL redirects — discovered by Google via analytics/old links
[[redirects]]
  from = "/home"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/startseite"
